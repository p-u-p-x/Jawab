services:
  - type: web
    name: jawab-bot
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PORT
        value: 8080
      - key: FLASK_ENV
        value: production
