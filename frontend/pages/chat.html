<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jawab | Web Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-tertiary: #1a1a1a;
      --neon-green: #39ff14;
      --neon-green-dim: #25b80d;
      --neon-green-faint: rgba(57, 255, 20, 0.08);
      --text-primary: #f0f0f0;
      --text-secondary: #888888;
      --text-dim: #444444;
      --border-color: rgba(57, 255, 20, 0.15);
      --border-active: rgba(57, 255, 20, 0.5);
      --danger: #ff4444;
      --warning: #ffaa00;
      --success: #39ff14;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: "DM Sans", sans-serif;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    body.page-ready { opacity: 1; }
    body.page-fade-out { opacity: 0; }
    a { color: inherit; text-decoration: none; }

    .container {
      width: min(1100px, 92vw);
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      gap: 20px;
    }
    .logo {
      font-family: "Orbitron", sans-serif;
      letter-spacing: 3px;
      font-weight: 700;
      font-size: 20px;
      color: var(--neon-green);
      text-shadow: 0 0 12px rgba(57, 255, 20, 0.6);
      animation: glowPulse 2.4s ease-in-out infinite;
    }
    .nav-links {
      display: flex;
      gap: 22px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .nav-links a { transition: color 0.2s ease; }
    .nav-links a:hover { color: var(--text-primary); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.97); }
    .btn-outline {
      border-color: var(--neon-green);
      color: var(--neon-green);
      background: transparent;
    }

    main {
      flex: 1;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 24px 0 40px;
    }

    .chat-shell {
      width: min(680px, 92vw);
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border-radius: 18px;
      border: 1px solid var(--border-color);
      border-top: 3px solid var(--neon-green);
      min-height: calc(100vh - 220px);
      overflow: hidden;
    }
    .chat-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: "Orbitron", sans-serif;
      letter-spacing: 1px;
    }
    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon-green);
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.8);
    }
    .session-id {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .chat-messages {
      flex: 1;
      padding: 18px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .message-row.user {
      justify-content: flex-end;
    }
    .message-bubble {
      max-width: 70%;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      line-height: 1.6;
      position: relative;
      animation: slideIn 0.35s ease;
    }
    .message-row.user .message-bubble {
      background: var(--neon-green-faint);
      border: 1px solid var(--border-color);
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--neon-green-faint);
      border: 1px solid var(--neon-green);
      color: var(--neon-green);
      font-family: "Orbitron", sans-serif;
      display: grid;
      place-items: center;
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      margin-top: 8px;
      font-family: "JetBrains Mono", monospace;
      border: 1px solid transparent;
    }
    .badge--query {
      color: var(--success);
      border-color: rgba(57, 255, 20, 0.5);
      background: rgba(57, 255, 20, 0.08);
    }
    .badge--complaint {
      color: var(--warning);
      border-color: rgba(255, 170, 0, 0.5);
      background: rgba(255, 170, 0, 0.1);
    }
    .badge--escalate {
      color: var(--danger);
      border-color: rgba(255, 68, 68, 0.5);
      background: rgba(255, 68, 68, 0.1);
    }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--bg-tertiary);
    }
    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon-green);
      display: inline-block;
      animation: dotPulse 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    .chat-input {
      display: flex;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }
    .chat-input input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      padding: 12px 14px;
      font-family: "DM Sans", sans-serif;
    }
    .chat-input input:focus {
      outline: none;
      border-color: var(--border-active);
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
    }
    .chat-input button {
      background: var(--neon-green);
      color: #0a0a0a;
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 16px rgba(57, 255, 20, 0.35);
    }
    .chat-input button:active { transform: scale(0.97); }

    .footer {
      border-top: 1px solid var(--border-color);
      background: var(--bg-primary);
      padding: 32px 0 24px;
    }
    .footer-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .footer p { color: var(--text-secondary); margin: 8px 0 0; }
    .footer-links { display: flex; gap: 16px; color: var(--text-secondary); }
    .footer-bottom { margin-top: 18px; color: var(--text-dim); font-size: 13px; }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 12px rgba(57, 255, 20, 0.4); }
      50% { text-shadow: 0 0 22px rgba(57, 255, 20, 0.8); }
    }
    @keyframes slideIn {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-4px); }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb {
      background: var(--neon-green-dim);
      border-radius: 10px;
    }
    * { scrollbar-width: thin; scrollbar-color: var(--neon-green-dim) var(--bg-primary); }

    @media (max-width: 900px) {
      .nav-inner { flex-direction: column; align-items: flex-start; }
      .chat-shell { min-height: calc(100vh - 260px); }
      .message-bubble { max-width: 82%; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body class="chat-page">
  <nav class="nav">
    <div class="container nav-inner">
      <div class="logo">JAWAB</div>
      <div class="nav-links">
        <a href="index.html" data-route="home">Home</a>
        <a href="about.html" data-route="about">About</a>
        <a href="chat.html" data-route="chat">Chat</a>
        <a href="dashboard.html" data-route="dashboard">Dashboard</a>
      </div>
      <a class="btn btn-outline" href="chat.html" data-route="chat">Try Live Demo</a>
    </div>
  </nav>

  <main>
    <section class="chat-shell" aria-live="polite">
      <div class="chat-header">
        <div class="chat-title">
          <span>Jawab</span>
          <span class="online-dot"></span>
          <span style="font-size:12px; color: var(--text-secondary);">Online</span>
        </div>
        <div class="session-id" id="session-id">Session: --</div>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <form class="chat-input" id="chat-form">
        <input id="chat-input" type="text" placeholder="Type your message..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <div>
          <div class="logo">JAWAB</div>
          <p>Jawab &mdash; Built for Pakistani businesses, powered by AI.</p>
        </div>
        <div class="footer-links">
          <a href="index.html" data-route="home">Home</a>
          <a href="about.html" data-route="about">About</a>
          <a href="chat.html" data-route="chat">Chat</a>
          <a href="dashboard.html" data-route="dashboard">Dashboard</a>
        </div>
      </div>
      <div class="footer-bottom">&copy; 2025 Jawab. A Gen AI Hackathon Project.</div>
    </div>
  </footer>

  <script>
    (function () {
      function applyRouteLinks() {
        const routeMap = {
          home: "/",
          about: "/about",
          chat: "/chat-page",
          dashboard: "/dashboard"
        };
        const isHttp = window.location.protocol === "http:" || window.location.protocol === "https:";
        if (!isHttp) return;
        document.querySelectorAll("[data-route]").forEach((link) => {
          const key = link.getAttribute("data-route");
          if (routeMap[key]) {
            link.setAttribute("href", routeMap[key]);
          }
        });
      }

      function initPageTransitions() {
        document.querySelectorAll("a[href]").forEach((link) => {
          const href = link.getAttribute("href");
          if (!href || href.startsWith("#") || href.startsWith("mailto:") || href.startsWith("tel:")) {
            return;
          }
          const url = new URL(link.href, window.location.href);
          if (url.origin !== window.location.origin) return;
          link.addEventListener("click", (event) => {
            if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
            event.preventDefault();
            document.body.classList.add("page-fade-out");
            setTimeout(() => { window.location.href = url.href; }, 250);
          });
        });
      }

      function createTypingIndicator() {
        const row = document.createElement("div");
        row.className = "message-row";
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "J";
        const bubble = document.createElement("div");
        bubble.className = "typing";
        bubble.innerHTML = "<span></span><span></span><span></span>";
        row.appendChild(avatar);
        row.appendChild(bubble);
        return row;
      }

      function addMessage(role, text, category, persist = true) {
        const messages = document.getElementById("chat-messages");
        const row = document.createElement("div");
        row.className = "message-row " + role;

        if (role === "bot") {
          const avatar = document.createElement("div");
          avatar.className = "avatar";
          avatar.textContent = "J";
          row.appendChild(avatar);
        }

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.textContent = text;

        if (role === "bot" && category) {
          const badge = document.createElement("div");
          const normalized = category.toLowerCase();
          if (normalized === "escalate") {
            badge.className = "badge badge--escalate";
            badge.innerHTML = "&#9888; Escalated";
          } else if (normalized === "complaint") {
            badge.className = "badge badge--complaint";
            badge.textContent = "complaint";
          } else {
            badge.className = "badge badge--query";
            badge.textContent = "query";
          }
          bubble.appendChild(badge);
        }

        row.appendChild(bubble);
        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;

        if (persist) {
          pushHistory({ role, text, category: category || "" });
        }
      }

      function getHistoryKey() {
        return "jawab_chat_history_web-user";
      }

      function loadHistory() {
        try {
          const raw = localStorage.getItem(getHistoryKey());
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function pushHistory(entry) {
        const history = loadHistory();
        history.push(entry);
        try {
          localStorage.setItem(getHistoryKey(), JSON.stringify(history));
        } catch (error) {
          // Ignore storage failures (quota, private mode).
        }
      }

      async function sendMessage() {
        const input = document.getElementById("chat-input");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";

        addMessage("user", text);

        const messages = document.getElementById("chat-messages");
        const typingRow = createTypingIndicator();
        messages.appendChild(typingRow);
        messages.scrollTop = messages.scrollHeight;

        const isHttp = window.location.protocol === "http:" || window.location.protocol === "https:";
        const apiBase = isHttp ? "" : "http://localhost:8080";

        try {
          const response = await fetch(apiBase + "/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, session_id: "web-user" })
          });

          if (!response.ok) {
            throw new Error("Request failed");
          }
          const data = await response.json();
          typingRow.remove();
          addMessage("bot", data.reply || "", data.category || "query");
        } catch (error) {
          typingRow.remove();
          addMessage("bot", "Something went wrong. Please try again.");
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.body.classList.add("page-ready");
        applyRouteLinks();
        initPageTransitions();

        document.getElementById("session-id").textContent = "Session: web-user";

        const existingHistory = loadHistory();
        if (existingHistory.length > 0) {
          existingHistory.forEach((entry) => {
            addMessage(entry.role, entry.text, entry.category || "", false);
          });
        } else {
          const wave = String.fromCodePoint(0x1F44B);
          addMessage("bot", "Assalam o Alaikum! " + wave + " I'm Jawab, your AI support assistant. How can I help you today?");
        }

        const form = document.getElementById("chat-form");
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          sendMessage();
        });
      });
    })();
  </script>
</body>
</html>
